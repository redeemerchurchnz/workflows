name: Laravel CI/CD

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version'
        type: string
        default: '8.4'
      php-extensions:
        description: 'PHP extensions to install'
        type: string
        default: 'dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv'
      env-vars:
        description: 'Additional .env lines (newline-separated)'
        type: string
        default: ''
      create-release:
        description: 'Create a GitHub release after deploy'
        type: boolean
        default: true
    secrets:
      deploy-hook:
        description: 'Webhook URL to trigger deployment'
        required: false

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: ${{ inputs.php-extensions }}
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Configure test environment
        if: inputs.env-vars != ''
        run: |
          echo "" >> .env
          echo "${{ inputs.env-vars }}" >> .env

      - name: Run tests
        run: php artisan test --compact

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy
        run: curl -s "${{ secrets.deploy-hook }}"

  release:
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && inputs.create-release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: |
          DATE_TAG="v$(date +'%Y.%m.%d')"
          EXISTING=$(git tag -l "${DATE_TAG}*" | wc -l | tr -d ' ')
          if [ "$EXISTING" -gt 0 ]; then
            TAG="${DATE_TAG}.${EXISTING}"
          else
            TAG="${DATE_TAG}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.tag.outputs.tag }}" --generate-notes --title "${{ steps.tag.outputs.tag }}"
